<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GNews — Live News Dashboard</title>
  <meta name="description" content="A beautiful live news dashboard powered by Google News RSS feeds." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: #0f1623;
      --surface2: #151d2e;
      --border: rgba(99, 179, 237, 0.12);
      --accent: #3b82f6;
      --accent2: #8b5cf6;
      --accent3: #06b6d4;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --card-hover: rgba(59, 130, 246, 0.06);
      --glow: rgba(59, 130, 246, 0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(59,130,246,0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(6,182,212,0.04) 0%, transparent 60%);
      animation: bgPulse 12s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes bgPulse {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(2%, 2%) scale(1.05); }
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      padding: 48px 0 32px;
      text-align: center;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 0 30px var(--glow);
    }

    .logo-text {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .tagline {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    /* Search Bar */
    .search-section {
      margin: 32px 0 24px;
    }

    .search-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 6px;
      display: flex;
      gap: 8px;
      align-items: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .search-wrapper:focus-within {
      border-color: rgba(59, 130, 246, 0.4);
      box-shadow: 0 4px 32px rgba(0,0,0,0.4), 0 0 0 3px rgba(59,130,246,0.1);
    }

    .search-icon {
      padding: 0 8px 0 14px;
      color: var(--text-muted);
      font-size: 18px;
      flex-shrink: 0;
    }

    #search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      padding: 12px 4px;
      caret-color: var(--accent);
    }

    #search-input::placeholder { color: var(--text-muted); }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
      padding-right: 4px;
    }

    .limit-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-dim);
      font-size: 0.85rem;
      font-family: inherit;
      padding: 8px 12px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .limit-select:focus { border-color: rgba(59,130,246,0.4); }

    .btn-fetch {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      padding: 10px 20px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(59,130,246,0.3);
    }

    .btn-fetch:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(59,130,246,0.4); }
    .btn-fetch:active { transform: translateY(0); }
    .btn-fetch:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Quick topics */
    .topics {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .topic-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-dim);
      font-size: 0.8rem;
      font-family: inherit;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .topic-chip:hover {
      background: var(--card-hover);
      border-color: rgba(59,130,246,0.3);
      color: #60a5fa;
      transform: translateY(-1px);
    }

    /* Feed title */
    .feed-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      min-height: 28px;
    }

    .feed-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .feed-count {
      background: rgba(59,130,246,0.15);
      color: #60a5fa;
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* News cards */
    #news-feed {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .news-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
      cursor: pointer;
      transition: all 0.25s ease;
      text-decoration: none;
      display: block;
      position: relative;
      overflow: hidden;
      animation: fadeSlideIn 0.4s ease both;
    }

    .news-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.25s;
      border-radius: 3px 0 0 3px;
    }

    .news-card:hover {
      background: var(--card-hover);
      border-color: rgba(59,130,246,0.25);
      transform: translateX(4px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), -4px 0 20px rgba(59,130,246,0.05);
    }

    .news-card:hover::before { opacity: 1; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-index {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 8px;
      opacity: 0.7;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .card-source {
      background: rgba(139,92,246,0.12);
      color: #a78bfa;
      border-radius: 6px;
      padding: 3px 9px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .card-date {
      color: var(--text-muted);
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-arrow {
      margin-left: auto;
      color: var(--text-muted);
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
    }

    .news-card:hover .card-arrow {
      opacity: 1;
      transform: translateX(4px);
    }

    /* States */
    .state-box {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }

    .state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      display: block;
    }

    .state-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .state-sub { font-size: 0.9rem; }

    /* Loading animation */
    .loading-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
      overflow: hidden;
      position: relative;
    }

    .skeleton::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .skel-line {
      background: var(--surface2);
      border-radius: 4px;
      margin-bottom: 10px;
    }

    .skel-line.title { height: 16px; width: 85%; }
    .skel-line.title2 { height: 16px; width: 60%; }
    .skel-line.meta { height: 12px; width: 30%; margin-top: 4px; }

    /* Error state */
    .error-box {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 12px;
      padding: 20px;
      color: #fca5a5;
      text-align: center;
      font-size: 0.9rem;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 48px 0 32px;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    footer span { color: #ef4444; }

    @media (max-width: 600px) {
      .search-wrapper { flex-wrap: wrap; }
      .controls { width: 100%; padding: 0 4px 4px; }
      .btn-fetch { flex: 1; }
      .logo-text { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">📡</div>
      <span class="logo-text">GNews</span>
    </div>
    <p class="tagline">Live headlines powered by Google News · Updated in real-time</p>
  </header>

  <section class="search-section">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input
        id="search-input"
        type="text"
        placeholder="Search any topic — AI, crypto, sports, politics…"
        autocomplete="off"
      />
      <div class="controls">
        <select class="limit-select" id="limit-select">
          <option value="5">5 results</option>
          <option value="10" selected>10 results</option>
          <option value="20">20 results</option>
          <option value="50">50 results</option>
        </select>
        <button class="btn-fetch" id="fetch-btn" onclick="fetchNews()">Fetch →</button>
      </div>
    </div>
  </section>

  <div class="topics">
    <button class="topic-chip" onclick="setSearch('Artificial Intelligence')">🤖 AI</button>
    <button class="topic-chip" onclick="setSearch('Technology')">💻 Tech</button>
    <button class="topic-chip" onclick="setSearch('Cryptocurrency')">₿ Crypto</button>
    <button class="topic-chip" onclick="setSearch('Climate')">🌍 Climate</button>
    <button class="topic-chip" onclick="setSearch('Science')">🔬 Science</button>
    <button class="topic-chip" onclick="setSearch('Business')">📈 Business</button>
    <button class="topic-chip" onclick="setSearch('Sports')">⚽ Sports</button>
    <button class="topic-chip" onclick="setSearch('')">🌐 Top Stories</button>
  </div>

  <div class="feed-header">
    <span class="feed-title" id="feed-title">Top Stories</span>
    <span class="feed-count" id="feed-count" style="display:none"></span>
  </div>

  <div id="news-feed">
    <div class="state-box">
      <span class="state-icon">📰</span>
      <div class="state-title">Ready to fetch news</div>
      <div class="state-sub">Press <strong>Fetch →</strong> or click a topic above</div>
    </div>
  </div>

  <footer>
    Built with <span>♥</span> · Powered by Google News RSS &amp; rss-parser
  </footer>
</div>

<script>
  async function fetchNews() {
    const query = document.getElementById('search-input').value.trim();
    const limit = document.getElementById('limit-select').value;
    const btn = document.getElementById('fetch-btn');
    const feed = document.getElementById('news-feed');
    const feedTitle = document.getElementById('feed-title');
    const feedCount = document.getElementById('feed-count');

    btn.disabled = true;
    btn.textContent = 'Loading…';

    // Show skeleton
    feed.innerHTML = Array(parseInt(limit) > 5 ? 5 : parseInt(limit)).fill(0).map(() => `
      <div class="skeleton">
        <div class="skel-line title"></div>
        <div class="skel-line title2"></div>
        <div class="skel-line meta"></div>
      </div>
    `).join('');

    try {
      const params = new URLSearchParams({ limit });
      if (query) params.append('search', query);

      const res = await fetch(`/api/news?${params}`);
      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();

      if (data.error) throw new Error(data.error);

      feedTitle.textContent = data.title || (query ? `"${query}"` : 'Top Stories');
      feedCount.textContent = `${data.items.length} articles`;
      feedCount.style.display = 'inline';

      if (data.items.length === 0) {
        feed.innerHTML = `<div class="state-box"><span class="state-icon">🔭</span><div class="state-title">No results found</div><div class="state-sub">Try a different search term</div></div>`;
        return;
      }

      feed.innerHTML = data.items.map((item, i) => {
        const date = item.pubDate ? formatDate(new Date(item.pubDate)) : '';
        const source = item.source || '';
        const title = escHtml(item.title || 'Untitled');
        return `
          <a class="news-card" href="${escHtml(item.link)}" target="_blank" rel="noopener" style="animation-delay:${i * 40}ms">
            <div class="card-index">ARTICLE ${String(i + 1).padStart(2, '0')}</div>
            <div class="card-title">${title}</div>
            <div class="card-meta">
              ${source ? `<span class="card-source">${escHtml(source)}</span>` : ''}
              ${date ? `<span class="card-date">🕐 ${date}</span>` : ''}
              <span class="card-arrow">↗</span>
            </div>
          </a>
        `;
      }).join('');

    } catch (err) {
      feed.innerHTML = `<div class="error-box">⚠️ ${escHtml(err.message)}</div>`;
      feedCount.style.display = 'none';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Fetch →';
    }
  }

  function setSearch(topic) {
    document.getElementById('search-input').value = topic;
    fetchNews();
  }

  function formatDate(d) {
    const now = new Date();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 60) return 'Just now';
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Fetch on Enter key
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchNews();
  });

  // Auto-load top stories on page load
  window.addEventListener('load', fetchNews);
</script>

</body>
</html>
